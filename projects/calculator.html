<!DOCTYPE hTML>
<html>
  <head>
  <title>Calculator</title>


  <head>
      <style>
       .red_button{
        background-color: rgb(200, 0, 0) ;
        color: white;
        border: none;
        height: 36px;
        width: 110px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;
        
        

       }

       .red_button:hover{
          opacity:0.8;
       }
       .red_button:active{
          opacity:0.5;
       }

       .join_button{
        background-color: white;
        border-color: rgb(58, 160, 255);
        border-width:1.8px ;
        
        color:rgb(0, 140, 255);
        
        border-radius: 2px ;
        margin-right:8px;
        cursor: pointer;
        transition: background_color 0.15s,
          color 0.15s;
        padding-right:15px;
        padding-left:15px;
        padding-top:9px;
        padding-bottom:9px;
        vertical-align:top;
        

       }
       .join_button:hover{
          background-color: rgb(0, 140, 255);
          color:white;
       }

       .join_button:active{
        opacity:0.7;
       }
      
       .tweet_button{
         background-color: rgb(0, 179, 255);
         color: white;
         border: none;
         height: 36px;
         width:70px;
         border-radius:20px ;
         font-weight: bold;
         font-size:15px;
         cursor:pointer;
         transition: box-shadow 0.15s;
         

       }

       .tweet_button:hover{
         box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15);
       }

      </style>

  </head>
  <body>
    
   <button class="red_button">SUBSCRIBE</button>
   <button class="join_button">JOIN</button>
   <button class="tweet_button">Tweet</button>

    </script>
  </body>

 
</html>
