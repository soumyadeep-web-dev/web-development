<!DOCTYPE html>
<html>
  <head>
    <title>YouTube.com Clone</title>
    <style>
     
    
     .text_box{
      width:260px;
      height:22px;
      border-radius:4px;
      border-width:2px;
      vertical-align:middle;
      border:none;
      margin-left:5px;

    }   
    .dp{
      width:50px;
      border-radius:200px;
      height:50px;
      object-fit:cover;
      vertical-align:middle;


    }
    .button_tweet{
      padding-top:9px;
      padding-bottom:9px;
      padding-left:15px;
      padding-right:15px;
      vertical-align:middle;
      border-radius:20px;
      background-color: rgb(48, 162, 255);
      color:white;
      border:none;
      font-weight:bold;
      font-style:arial;


    }
    .button_tweet:hover{
      cursor:pointer;
    }
      
    </style>
  </head>
  <body>
    <img class="dp" src="thumbnails/funny-british-shorthair-cat-portrait-looking-shocked-or-surprised.webp">
    <input class="text_box" type="textbox" placeholder="What's happening?">
    <button class="button_tweet">Tweet</button>
    
   
  </body>
</html>
